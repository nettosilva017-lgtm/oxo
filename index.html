<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Almanaque Ouxe — Caça-Palavras Premium</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #001f3f;
      --panel: #071428;
      --accent: #00bfff;
      --gold: #ffd700;
      --found: #32cd32;
      --card-grad: linear-gradient(135deg, #2a6fb0, #1b3b6a);
      --cell-size: 44px;
      --gap: 6px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at center, #001f3f 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 10px;
      margin: 0;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 10px 0;
    }

    h1#titulo {
      margin: 0;
      font-family: 'Georgia', serif;
      font-size: clamp(24px, 6vw, 40px);
      color: var(--gold);
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      cursor: pointer;
      user-select: none;
      transition: var(--transition);
      padding: 5px;
    }

    h1#titulo:active {
      transform: scale(0.98);
      text-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
    }

    .layout {
      width: 100%;
      max-width: 1400px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      align-items: start;
      padding: 0 5px;
    }

    .ads-col {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .ad {
      width: clamp(90px, 18vw, 160px);
      height: clamp(60px, 12vw, 110px);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0, 191, 255, 0.2);
      position: relative;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: var(--transition);
      flex-shrink: 0;
    }

    .ad:active {
      transform: scale(0.95);
      border-color: var(--accent);
    }

    .ad .ad-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .ad .ad-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      font-weight: 700;
      color: #fff;
      text-align: center;
      font-size: clamp(10px, 2vw, 14px);
      padding: 5px;
      backdrop-filter: blur(2px);
      line-height: 1.2;
    }

    .center-panel {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.03);
      padding: clamp(10px, 3vw, 20px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin: 0 auto;
    }

    #info-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5px;
      font-weight: 600;
      font-size: clamp(12px, 3vw, 16px);
      gap: 10px;
      flex-wrap: wrap;
    }

    #score {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
      white-space: nowrap;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: clamp(3px, 1vw, 6px);
      width: 100%;
      max-width: 100%;
      aspect-ratio: 1;
      padding: clamp(8px, 2vw, 15px);
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      touch-action: manipulation;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(145deg, #004080, #002050);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      font-size: clamp(12px, 4vw, 20px);
      cursor: pointer;
      border: 1px solid rgba(0, 191, 255, 0.1);
      transition: var(--transition);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .cell:active:not(.found):not(.selected) {
      background: #0056b3;
      transform: scale(0.95);
    }

    .cell.selected {
      background: var(--gold);
      color: #000;
      transform: scale(0.98);
      box-shadow: 0 0 10px var(--gold);
      z-index: 2;
    }

    .cell.found {
      background: var(--found);
      color: #000;
      border-color: transparent;
      opacity: 0.9;
    }

    #words {
      width: 100%;
      margin-top: 5px;
      font-size: clamp(12px, 2.5vw, 16px);
      text-align: center;
      line-height: 1.6;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
    }

    #words span {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      word-break: break-word;
    }

    #words .found {
      color: var(--found);
      text-decoration: line-through;
      background: rgba(50, 205, 50, 0.1);
    }

    #admin {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel);
      padding: clamp(15px, 5vw, 25px);
      border-radius: 15px;
      border: 1px solid var(--accent);
      max-width: 90vw;
      width: 100%;
      max-height: 90vh;
      z-index: 1000;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      overflow-y: auto;
    }

    .admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 999;
      backdrop-filter: blur(5px);
    }

    #admin h3 {
      margin: 0 0 10px 0;
      color: var(--accent);
      font-size: clamp(14px, 3vw, 18px);
    }

    #admin h4 {
      margin: 10px 0 5px 0;
      font-size: clamp(12px, 2.5vw, 14px);
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0a1a30;
      color: #fff;
      margin-bottom: 10px;
      font-family: inherit;
      font-size: 14px;
    }

    button {
      padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 20px);
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #001;
      cursor: pointer;
      font-weight: 700;
      transition: var(--transition);
      font-size: clamp(12px, 2.5vw, 14px);
    }

    button:active {
      filter: brightness(0.9);
      transform: scale(0.98);
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      max-height: 200px;
      overflow-y: auto;
      margin: 10px 0;
      padding-right: 5px;
    }

    .upload-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .upload-row input {
      padding: 6px;
      font-size: 12px;
    }

    .small {
      font-size: clamp(11px, 2vw, 13px);
      color: #aaa;
    }

    footer {
      margin-top: auto;
      padding: clamp(10px, 3vw, 20px);
      color: #666;
      font-size: clamp(11px, 2vw, 13px);
      text-align: center;
      width: 100%;
    }

    /* Breakpoint: Tablets e acima */
    @media (min-width: 768px) {
      .wrap {
        padding: 20px;
        gap: 20px;
      }

      .layout {
        grid-template-columns: 150px 1fr 150px;
        gap: 20px;
        padding: 0;
      }

      .ads-col {
        flex-direction: column;
        flex-wrap: nowrap;
      }

      .ad {
        width: 100%;
        height: auto;
        aspect-ratio: 16/10;
      }

      .center-panel {
        max-width: 100%;
      }

      #grid {
        max-width: 500px;
      }
    }

    /* Breakpoint: Desktop grande */
    @media (min-width: 1024px) {
      .wrap {
        padding: 30px;
      }

      .layout {
        grid-template-columns: 200px 1fr 200px;
        gap: 25px;
      }

      .ad {
        width: 100%;
        height: 120px;
      }

      #grid {
        max-width: 550px;
      }
    }

    /* Breakpoint: Muito pequeno (< 380px) */
    @media (max-width: 380px) {
      h1#titulo {
        font-size: 20px;
      }

      .ads-col {
        gap: 8px;
      }

      .ad {
        width: clamp(70px, 15vw, 100px);
        height: clamp(50px, 10vw, 70px);
      }

      .center-panel {
        padding: 8px;
        gap: 8px;
      }

      #info-bar {
        gap: 5px;
      }

      button {
        padding: 6px 10px;
        font-size: 11px;
      }

      #admin {
        padding: 12px;
      }
    }

    /* Landscape mode */
    @media (max-height: 600px) and (orientation: landscape) {
      .wrap {
        padding: 8px;
        gap: 8px;
      }

      h1#titulo {
        font-size: 20px;
        padding: 2px;
      }

      .center-panel {
        padding: 8px;
        gap: 8px;
      }

      .ads-col {
        gap: 5px;
      }

      .ad {
        width: clamp(60px, 12vw, 100px);
        height: clamp(40px, 8vw, 70px);
      }

      #grid {
        padding: 5px;
      }

      #words {
        font-size: 12px;
        gap: 3px;
      }

      #words span {
        padding: 2px 4px;
        font-size: 11px;
      }
    }

    /* Suporte para notch (iPhone) */
    @supports (padding: max(0px)) {
      body {
        padding-left: max(0px, env(safe-area-inset-left));
        padding-right: max(0px, env(safe-area-inset-right));
        padding-top: max(0px, env(safe-area-inset-top));
        padding-bottom: max(0px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="admin-overlay" id="overlay"></div>
  <div class="wrap">
    <header>
      <h1 id="titulo">Almanaque Ouxe</h1>
    </header>

    <div class="layout">
      <div class="ads-col" id="leftAds">
        <div class="ad" id="card1"><img class="ad-img" id="ad1" alt=""><div class="ad-label" id="label1">Mega Mart</div></div>
        <div class="ad" id="card2"><img class="ad-img" id="ad2" alt=""><div class="ad-label" id="label2">Bella Moda</div></div>
        <div class="ad" id="card3"><img class="ad-img" id="ad3" alt=""><div class="ad-label" id="label3">Super Tech</div></div>
        <div class="ad" id="card4"><img class="ad-img" id="ad4" alt=""><div class="ad-label" id="label4">Tropico Tour</div></div>
        <div class="ad" id="card5"><img class="ad-img" id="ad5" alt=""><div class="ad-label" id="label5">Optika Vision</div></div>
      </div>

      <div class="center-panel" id="centerPanel">
        <div id="info-bar">
          <div id="score">Pontuação: 0</div>
          <button onclick="iniciarJogo()" style="padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.1); color: #fff;">Novo</button>
        </div>
        <div id="grid" aria-label="caça palavras" role="grid"></div>
        <div id="words" aria-live="polite"></div>
      </div>

      <div class="ads-col" id="rightAds">
        <div class="ad" id="card6"><img class="ad-img" id="ad6" alt=""><div class="ad-label" id="label6">Pet Show</div></div>
        <div class="ad" id="card7"><img class="ad-img" id="ad7" alt=""><div class="ad-label" id="label7">Fast Car</div></div>
        <div class="ad" id="card8"><img class="ad-img" id="ad8" alt=""><div class="ad-label" id="label8">Café Delícia</div></div>
        <div class="ad" id="card9"><img class="ad-img" id="ad9" alt=""><div class="ad-label" id="label9">FitLife Academy</div></div>
        <div class="ad" id="card10"><img class="ad-img" id="ad10" alt=""><div class="ad-label" id="label10">Jolimóveis</div></div>
      </div>
    </div>

    <div id="admin" role="region" aria-label="Painel de administração">
      <h3>Painel Administrativo</h3>
      <label class="small">Palavras (separe por vírgula):</label>
      <textarea id="palavrasInput" rows="3">FEIRA,OUXE,GATO,PRINCESA,SERTAO,BEBE,AGUA,CRUZADAS</textarea>
      <button id="btnAtualizarPalavras" style="width: 100%;">Atualizar Palavras</button>

      <h4>Imagens dos Anúncios</h4>
      <div id="uploadArea" class="upload-grid"></div>

      <div style="margin-top: 10px; display: flex; gap: 8px;">
        <button id="btnFecharAdmin" style="flex: 1; background: #555; color: #fff;">Fechar</button>
      </div>
    </div>

    <footer>Salve este arquivo como <strong>Jesus é o Senhor!</strong> Boa diversão.</footer>
  </div>

<script>
/* ===========================
   Configurações e Estado
   =========================== */
const DICIONARIO_PADRAO = [
  "FEIRA","OUXE","GATO","PRINCESA","SERTAO","BEBE","AGUA","CRUZADAS",
  "CASA","CARRO","FLORESTA","RIO","SOL","LUA","ESTRELA","MONTANHA",
  "ESCOLA","TRABALHO","AMOR","VIDA","FUTEBOL","MUSICA","DANCA","PRAIA",
  "BOM","FESTA","LOJA","PIZZA","SAUDE","TECNICA","CIDADE","BAHIA"
];

let dicionario = [...DICIONARIO_PADRAO];
let palavras = [];
const tamanho = 10;
const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let matriz = [];
let selecionadas = [];
let palavrasEncontradas = [];
let pontuacao = 0;
let cliqueTitulo = 0;

/* ===========================
   Utilitários
   =========================== */
function senhaAtual() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  return dd + mm + hh;
}

function shuffleArray(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ===========================
   Admin
   =========================== */
const tituloEl = document.getElementById('titulo');
const adminEl = document.getElementById('admin');
const overlayEl = document.getElementById('overlay');

tituloEl.addEventListener('click', () => {
  cliqueTitulo++;
  if(cliqueTitulo >= 8) {
    cliqueTitulo = 0;
    const senha = prompt("Senha de administração (DDMMHH):");
    if(senha === senhaAtual()) {
      adminEl.style.display = 'block';
      overlayEl.style.display = 'block';
      gerarUploadInputs();
    } else {
      alert("Senha incorreta.");
    }
  }
});

document.getElementById('btnFecharAdmin').addEventListener('click', fecharAdmin);
overlayEl.addEventListener('click', fecharAdmin);

function fecharAdmin() {
  adminEl.style.display = 'none';
  overlayEl.style.display = 'none';
}

/* ===========================
   Lógica do Jogo
   =========================== */
function sortearPalavras() {
  const copia = [...dicionario];
  shuffleArray(copia);
  palavras = copia.filter(w => w && w.length <= tamanho).slice(0, 8).map(w => w.toUpperCase());
}

function criarMatrizVazia() {
  matriz = Array.from({length: tamanho}, () => Array.from({length: tamanho}, () => ""));
}

function podeColocar(pal, linha, col, dirI, dirJ) {
  for(let k = 0; k < pal.length; k++) {
    const ni = linha + k * dirI;
    const nj = col + k * dirJ;
    if(ni < 0 || ni >= tamanho || nj < 0 || nj >= tamanho) return false;
    const c = matriz[ni][nj];
    if(c !== "" && c !== pal[k]) return false;
  }
  return true;
}

function colocarPalavra(pal, linha, col, dirI, dirJ) {
  for(let k = 0; k < pal.length; k++) {
    matriz[linha + k * dirI][col + k * dirJ] = pal[k];
  }
}

function preencherPalavras() {
  const direcoes = [[0,1], [1,0], [1,1], [0,-1], [-1,0], [-1,-1], [1,-1], [-1,1]];
  palavras.forEach(pal => {
    let colocado = false;
    let tentativas = 0;
    while(!colocado && tentativas < 500) {
      tentativas++;
      const dir = direcoes[Math.floor(Math.random() * direcoes.length)];
      const li = Math.floor(Math.random() * tamanho);
      const co = Math.floor(Math.random() * tamanho);
      if(podeColocar(pal, li, co, dir[0], dir[1])) {
        colocarPalavra(pal, li, co, dir[0], dir[1]);
        colocado = true;
      }
    }
  });
}

function preencherAleatorio() {
  for(let i = 0; i < tamanho; i++) {
    for(let j = 0; j < tamanho; j++) {
      if(matriz[i][j] === "") matriz[i][j] = letras[Math.floor(Math.random() * letras.length)];
    }
  }
}

function desenharGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = "";
  for(let i = 0; i < tamanho; i++) {
    for(let j = 0; j < tamanho; j++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.pos = `${i},${j}`;
      div.textContent = matriz[i][j];
      div.addEventListener('mousedown', () => iniciarSelecao(i, j));
      div.addEventListener('mouseenter', () => continuarSelecao(i, j));
      div.addEventListener('touchstart', (e) => { e.preventDefault(); iniciarSelecao(i, j); });
      div.addEventListener('touchmove', (e) => { e.preventDefault(); continuarSelecao(i, j); });
      gridEl.appendChild(div);
    }
  }
}

let isSelecting = false;
let startPos = null;

function iniciarSelecao(i, j) {
  isSelecting = true;
  startPos = {i, j};
  clearSelection();
  toggleCell(i, j, true);
}

function continuarSelecao(i, j) {
  if(!isSelecting) return;
  const currentPos = {i, j};
  const path = getStraightPath(startPos, currentPos);
  if(path) {
    clearSelection();
    path.forEach(p => toggleCell(p.i, p.j, true));
    selecionadas = path.map(p => `${p.i},${p.j}`);
    verificarPalavra();
  }
}

document.addEventListener('mouseup', () => {
  isSelecting = false;
  if(selecionadas.length > 0) {
    const pal = getPalavraSelecionada();
    if(!palavras.includes(pal) && !palavras.includes(pal.split('').reverse().join(''))) {
      clearSelection();
    }
  }
});

document.addEventListener('touchend', () => {
  isSelecting = false;
  if(selecionadas.length > 0) {
    const pal = getPalavraSelecionada();
    if(!palavras.includes(pal) && !palavras.includes(pal.split('').reverse().join(''))) {
      clearSelection();
    }
  }
});

function getStraightPath(start, end) {
  const di = end.i - start.i;
  const dj = end.j - start.j;
  if(di !== 0 && dj !== 0 && Math.abs(di) !== Math.abs(dj)) return null;
  const stepI = Math.sign(di);
  const stepJ = Math.sign(dj);
  const steps = Math.max(Math.abs(di), Math.abs(dj));
  const path = [];
  for(let k = 0; k <= steps; k++) {
    path.push({i: start.i + k * stepI, j: start.j + k * stepJ});
  }
  return path;
}

function toggleCell(i, j, state) {
  const cell = document.querySelector(`.cell[data-pos="${i},${j}"]`);
  if(cell) cell.classList.toggle('selected', state);
}

function clearSelection() {
  document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
  selecionadas = [];
}

function getPalavraSelecionada() {
  return selecionadas.map(p => {
    const [i, j] = p.split(',').map(Number);
    return matriz[i][j];
  }).join("");
}

function verificarPalavra() {
  const pal = getPalavraSelecionada();
  const rev = pal.split('').reverse().join('');
  if(palavras.includes(pal) && !palavrasEncontradas.includes(pal)) {
    marcarEncontrada(pal);
  } else if(palavras.includes(rev) && !palavrasEncontradas.includes(rev)) {
    marcarEncontrada(rev);
  }
}

function marcarEncontrada(pal) {
  selecionadas.forEach(p => {
    const [i, j] = p.split(',').map(Number);
    document.querySelector(`.cell[data-pos="${i},${j}"]`).classList.add('found');
  });
  palavrasEncontradas.push(pal);
  pontuacao += 10;
  atualizarPontuacao();
  mostrarPalavras();
  clearSelection();
  
  if(palavrasEncontradas.length === palavras.length) {
    setTimeout(() => {
      alert("Parabéns! Você encontrou todas as palavras!");
      iniciarJogo();
    }, 300);
  }
}

function mostrarPalavras() {
  const el = document.getElementById('words');
  el.innerHTML = palavras.map(p => 
    `<span class="${palavrasEncontradas.includes(p) ? 'found' : ''}">${p}</span>`
  ).join('');
}

function atualizarPontuacao() {
  document.getElementById('score').textContent = `Pontuação: ${pontuacao}`;
}

/* ===========================
   Admin: Funções
   =========================== */
document.getElementById('btnAtualizarPalavras').addEventListener('click', () => {
  const raw = document.getElementById('palavrasInput').value;
  const arr = raw.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
  if(arr.length < 1) return alert("Informe palavras válidas.");
  dicionario = Array.from(new Set(arr.concat(DICIONARIO_PADRAO)));
  iniciarJogo();
  fecharAdmin();
});

function gerarUploadInputs() {
  const area = document.getElementById('uploadArea');
  area.innerHTML = "";
  for(let i = 1; i <= 10; i++) {
    const row = document.createElement('div');
    row.className = 'upload-row';
    row.innerHTML = `<label class="small">Anúncio ${i}</label>
                     <input type="file" accept="image/*" onchange="onUploadImage(event, ${i})">`;
    area.appendChild(row);
  }
}

function onUploadImage(e, id) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = document.getElementById('ad' + id);
    const label = document.getElementById('label' + id);
    img.src = ev.target.result;
    img.style.display = 'block';
    label.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function iniciarJogo() {
  sortearPalavras();
  criarMatrizVazia();
  preencherPalavras();
  preencherAleatorio();
  palavrasEncontradas = [];
  pontuacao = 0;
  atualizarPontuacao();
  desenharGrid();
  mostrarPalavras();
}

// Inicializar
iniciarJogo();
</script>
